name: CI — Validate Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Validate Prometheus config ─────────────────────
  validate-prometheus:
    name: 🔍 Prometheus Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate prometheus.yml
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/prometheus:/etc/prometheus:ro \
            prom/prometheus:v2.51.2 \
            check config /etc/prometheus/prometheus.yml

      - name: Validate alert rules
        run: |
          docker run --rm \
          --entrypoint promtool \
          -v ${{ github.workspace }}/prometheus:/etc/prometheus:ro \
          prom/prometheus:v2.51.2 \
            check rules \
              /etc/prometheus/host.rules.yml \
              /etc/prometheus/app.rules.yml

      - name: Debug files inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/prometheus:/etc/prometheus:ro \
            prom/prometheus:v2.51.2 \
            ls -R /etc/prometheus

  # ── Validate Alertmanager config ───────────────────
  validate-alertmanager:
    name: 🔔 Alertmanager Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate alertmanager.yml
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/alertmanager:/etc/alertmanager:ro \
            prom/alertmanager:v0.27.0 \
            amtool check-config /etc/alertmanager/alertmanager.yml

  # ── Validate docker-compose ────────────────────────
  validate-compose:
    name: 🐳 Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ── Smoke test — start and health check ────────────
  smoke-test:
    name: 💨 Smoke Test
    runs-on: ubuntu-latest
    needs: [validate-prometheus, validate-alertmanager, validate-compose]
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for Prometheus..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:9090/-/healthy && break || sleep 3
          done
          echo "Waiting for Grafana..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/health && break || sleep 3
          done
          echo "Waiting for Alertmanager..."
          for i in $(seq 1 15); do
            curl -sf http://localhost:9093/-/healthy && break || sleep 3
          done

      - name: Health checks
        run: |
          curl -sf http://localhost:9090/-/healthy  || (echo "Prometheus FAILED" && exit 1)
          curl -sf http://localhost:3000/api/health || (echo "Grafana FAILED"    && exit 1)
          curl -sf http://localhost:9093/-/healthy  || (echo "Alertmanager FAILED" && exit 1)
          echo "All services healthy ✓"

      - name: Check Prometheus targets
        run: |
          sleep 10
          curl -sf http://localhost:9090/api/v1/targets | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          active = data['data']['activeTargets']
          print(f'Active targets: {len(active)}')
          for t in active:
              print(f\"  {t['labels'].get('job','?')} — {t['health']}\")
          "

      - name: Tear down
        if: always()
        run: docker compose down -v
