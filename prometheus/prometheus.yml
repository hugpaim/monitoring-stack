global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    env:     'local'
    monitor: 'monitoring-stack'

# ── Alertmanager ──────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ── Alert rules ───────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/alerts/*.yml

# ── Scrape configs ────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter — host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          host: 'local'

  # cAdvisor — container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Grafana
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # ── Add your own targets below ────────────────────
  # - job_name: 'my-app'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['my-app-host:8080']
  #       labels:
  #         service: 'my-app'
  #         env:     'prod'
